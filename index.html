<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>配信雑談16タイプ分類チェックシート</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="container">
      <p class="eyebrow">VTuber・配信者向け</p>
      <h1>配信雑談16タイプ分類チェックシート</h1>
      <p>20問の7段階評価で、雑談の構造を4軸から判定します。</p>
    </div>
  </header>

  <main class="container">
    <section class="intro card">
      <h2>使い方</h2>
      <p>各設問で、左の文に近いほど1、右の文に近いほど7を選んでください。未回答がある場合、結果は表示されません。</p>
      <div class="scale-help" aria-label="7段階評価の説明">
        <span>1 かなり左</span>
        <span>4 中立</span>
        <span>7 かなり右</span>
      </div>
    </section>

    <form id="checksheet" novalidate></form>

    <section class="actions card">
      <button type="button" id="show-result">結果を表示</button>
      <button type="button" id="reset-answers" class="secondary">回答をリセット</button>
      <p id="validation-message" class="message" role="status" aria-live="polite"></p>
    </section>

    <section id="result" class="result card" hidden aria-live="polite"></section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>この分類は配信者の能力評価ではなく、雑談の構造を整理するためのものです。</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
